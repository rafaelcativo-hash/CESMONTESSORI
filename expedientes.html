<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Expediente - CES Montessori</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">Escuela CES Montessori: Registro de Expediente</h1>
        
        <div id="form-expediente" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="text" id="nombre" placeholder="Nombre completo del estudiante" class="col-span-1 md:col-span-2 p-3 border rounded-lg">
            <input type="text" id="cedula" placeholder="Cédula" class="p-3 border rounded-lg">
            <input type="date" id="fecha_nacimiento" class="p-3 border rounded-lg">
            <input type="text" id="direccion" placeholder="Dirección exacta" class="col-span-1 md:col-span-2 p-3 border rounded-lg">

            <div class="col-span-1 md:col-span-2 font-bold text-slate-600 mt-2">Información de Encargados</div>
            <input type="text" id="encargado1" placeholder="Encargado 1" class="p-3 border rounded-lg">
            <input type="email" id="correo1" placeholder="Correo Encargado 1" class="p-3 border rounded-lg">
            <input type="text" id="encargado2" placeholder="Encargado 2" class="p-3 border rounded-lg">
            <input type="email" id="correo2" placeholder="Correo Encargado 2" class="p-3 border rounded-lg">

            <div class="col-span-1 md:col-span-2 font-bold text-slate-600 mt-2">Detalles de Matrícula</div>
            <select id="nivel" class="p-3 border rounded-lg">
                <option value="Casa de Niños">Casa de Niños</option>
                <option value="1° Ciclo">1° Ciclo</option>
                <option value="2° Ciclo">2° Ciclo</option>
            </select>
            <input type="text" id="instrumento" placeholder="Instrumento Musical" class="p-3 border rounded-lg">
            
            <div class="col-span-1 md:col-span-2 flex gap-6 items-center bg-slate-50 p-4 rounded-lg">
                <label><input type="checkbox" id="pago1" class="mr-2"> Pago Opcional 1</label>
                <label><input type="checkbox" id="pago2" class="mr-2"> Pago Opcional 2</label>
            </div>

            <button onclick="guardarExpediente()" class="col-span-1 md:col-span-2 bg-blue-700 text-white py-4 rounded-lg font-bold hover:bg-blue-800 transition">GUARDAR EXPEDIENTE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('TU_URL', 'TU_KEY');

        async function guardarExpediente() {
            const data = {
                nombre_completo: document.getElementById('nombre').value,
                cedula: document.getElementById('cedula').value,
                fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
                direccion: document.getElementById('direccion').value,
                nombre_encargado: document.getElementById('encargado1').value,
                segundo_encargado: document.getElementById('encargado2').value,
                correo_encargado1: document.getElementById('correo1').value,
                correo_encargado2: document.getElementById('correo2').value,
                nivel_asignado: document.getElementById('nivel').value,
                instrumento_musical: document.getElementById('instrumento').value,
                pago_opcional1: document.getElementById('pago1').checked,
                pago_opcional2: document.getElementById('pago2').checked
            };

            const { error } = await supabase.from('estudiantes').insert([data]);
            if (error) alert("Error al guardar: " + error.message);
            else { alert("Expediente guardado correctamente."); location.reload(); }
        }
    </script>
</body>
</html>
