<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-10">
    <div class="max-w-md mx-auto space-y-4">
        <input id="nombre" placeholder="Nombre" class="w-full border p-2">
        <input id="cedula" placeholder="Cédula" class="w-full border p-2">
        <input id="nivel" placeholder="Nivel" class="w-full border p-2">
        <button onclick="guardar()" class="bg-blue-500 text-white w-full p-2">GUARDAR</button>
    </div>
    <script>
        const supabase = supabase.createClient('TU_URL', 'TU_KEY');
        async function guardar() {
            const { error } = await supabase.from('estudiantes').insert([{
                nombre_completo: document.getElementById('nombre').value,
                cedula: document.getElementById('cedula').value,
                nivel_asignado: document.getElementById('nivel').value
            }]);
            error ? alert(error.message) : alert("Guardado");
        }
    </script>
</body>
</html>
