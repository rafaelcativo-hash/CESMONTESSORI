<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Expedientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-10">
    <h1 class="text-3xl font-bold mb-6">Registro de Estudiantes</h1>
    <div class="bg-white p-6 rounded shadow mb-6">
        <input type="text" id="nombre" placeholder="Nombre completo" class="border p-2 w-full mb-2">
        <input type="text" id="cedula" placeholder="Cédula" class="border p-2 w-full mb-4">
        <button onclick="guardar()" class="bg-green-600 text-white px-6 py-2 rounded">Matricular</button>
    </div>

    <script>
        const supabase = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");

        async function guardar() {
            const { error } = await supabase.from('estudiantes').insert([{
                nombre_completo: document.getElementById('nombre').value,
                cedula: document.getElementById('cedula').value
            }]);
            if (error) alert(error.message); else alert("Guardado con éxito");
        }
    </script>
</body>
</html>
