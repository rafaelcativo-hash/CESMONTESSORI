<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Expedientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-10">
    <h1 class="text-3xl font-bold mb-6">Registro Estudiantes</h1>
    <div class="bg-white p-6 rounded shadow mb-6">
        <input type="text" id="nombre" placeholder="Nombre completo" class="border p-2 w-full mb-2">
        <input type="text" id="cedula" placeholder="Cédula" class="border p-2 w-full mb-4">
        <button id="saveBtn" class="bg-green-600 text-white px-6 py-2 rounded">Matricular</button>
    </div>
    <script>
        window.db = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('saveBtn').addEventListener('click', async () => {
                const { error } = await window.db.from('estudiantes').insert([{
                    nombre_completo: document.getElementById('nombre').value,
                    cedula: document.getElementById('cedula').value
                }]);
                if (error) alert("Error: " + error.message); else alert("Guardado correctamente");
            });
        });
    </script>
</body>
</html>
