<script>
        const db = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");
        
        async function cargarDatos() {
            try {
                // Probamos con una tabla que sabemos que existe: 'estudiantes'
                const { data, error } = await db.from('estudiantes').select('*');
                
                if (error) {
                    alert("Error de Supabase: " + error.message);
                } else if (!data || data.length === 0) {
                    alert("Conexión exitosa, pero la tabla 'estudiantes' está vacía.");
                } else {
                    document.getElementById('grid').innerHTML = data.map(e => `
                        <div class='bg-white p-4 shadow rounded'>
                            <h3 class='font-bold'>${e.nombre_completo || 'Sin nombre'}</h3>
                        </div>`).join('');
                }
            } catch (e) {
                alert("Error fatal: " + e.message);
            }
        }
        cargarDatos();
    </script>
