<script>
    // 1. Declaramos la variable globalmente UNA SOLA VEZ
    // Si ya tienes una línea que dice 'const supabase =', borra la otra.
    const supabase = supabase.createClient(
        "https://vdfxdydbggeoflagznuq.supabase.co", 
        "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz"
    );

    // 2. Lógica para el botón (usa el ID 'loginBtn')
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('loginBtn');
        if (btn) {
            btn.addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('pass').value;

                const { error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: pass
                });

                if (error) {
                    alert("Error: " + error.message);
                } else {
                    window.location.href = "calificaciones.html";
                }
            });
        }
    });
</script>
