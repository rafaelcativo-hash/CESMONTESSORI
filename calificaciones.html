<script>
    // Esta función vincula al docente con sus grupos automáticamente
    async function obtenerCargaDocenteExclusiva() {
        const grid = document.getElementById('gridCargasDocente');
        
        // 1. Identificar quién está entrando
        const { data: { user }, error: authError } = await supabaseClient.auth.getUser();

        if (authError || !user) {
            window.location.href = "index.html"; // Si no hay sesión, regresa al login
            return;
        }

        // 2. Consultar la tabla de docentes_niveles para traer su carga actual
        // Al usar el ID del usuario logueado, la vinculación se actualiza sola al cambiar datos en la tabla
        const { data: cargas, error: dbError } = await supabaseClient
            .from('docentes_niveles')
            .select('*')
            .eq('perfil_id', user.id); // Vínculo directo por ID de usuario

        if (dbError || !cargas || cargas.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center p-4 text-red-500">No tienes grupos asignados. Contacta al administrador.</div>`;
            return;
        }

        grid.innerHTML = '';

        // 3. Generar las tarjetas de acceso automáticamente
        cargas.forEach(carga => {
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 transition cursor-pointer";
            card.onclick = () => abrirPlanillaSegura(carga.materia_especifica, carga.nivel_asignado);
            
            card.innerHTML = `
                <h4 class="text-lg font-bold text-slate-900">${carga.materia_especifica}</h4>
                <p class="text-xs text-slate-500">Nivel: ${carga.nivel_asignado}</p>
                <div class="mt-4 text-blue-600 text-xs font-bold">Acceder al registro ➔</div>
            `;
            grid.appendChild(card);
        });
    }
</script>
