<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CES Montessori - Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-6">
    <h1 class="text-3xl font-bold mb-6">Lista de Estudiantes</h1>
    <div id="lista" class="grid gap-4"></div>

    <script>
        const supabaseUrl = "https://vdfxdydbggeoflagznuq.supabase.co";
        const supabaseKey = "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz";
        window.db = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargar() {
            const { data, error } = await window.db.from('estudiantes').select('*');
            if (error) {
                document.getElementById('lista').innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            } else {
                document.getElementById('lista').innerHTML = data.map(e => `
                    <div class="bg-white p-4 shadow rounded border">${e.nombre_completo}</div>
                `).join('');
            }
        }
        cargar();
    </script>
</body>
</html>
