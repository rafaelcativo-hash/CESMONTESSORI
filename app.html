<script>
    // ... (dentro de tu función render(vista) en app.html)

    } else if (vista === 'matricula') {
        app.innerHTML = `
            <h2 class="text-xl font-bold mb-4">Matrícula de Materias</h2>
            <div class="space-y-4">
                <input id="est_id" placeholder="ID del Estudiante" class="border p-2 w-full">
                <select id="materia" class="border p-2 w-full">
                    <option value="Espanol">Español</option>
                    <option value="Danza">Danza (Pago)</option>
                    <option value="Guitarra">Guitarra (Pago)</option>
                </select>
                <label><input type="checkbox" id="es_obligatoria"> ¿Es obligatoria?</label>
                <button onclick="guardarMatricula()" class="bg-green-600 text-white p-2 w-full rounded">Matricular</button>
            </div>`;
    }

    // Nueva función para guardar la relación
    async function guardarMatricula() {
        const estId = document.getElementById('est_id').value;
        const mat = document.getElementById('materia').value;
        const obligatoria = document.getElementById('es_obligatoria').checked;

        const { error } = await db.from('matriculas').insert([{ 
            estudiante_id: estId, 
            materia_nombre: mat, 
            es_obligatoria: obligatoria 
        }]);
        
        if(error) alert("Error: " + error.message);
        else alert("Matrícula guardada con éxito");
    }
</script>
