<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CES Montessori - Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-6">
    <h1 class="text-3xl font-bold mb-6">Lista de Estudiantes</h1>
    <div id="lista" class="grid gap-4">
        <p>Cargando...</p>
    </div>

    <script>
        const supabaseUrl = "https://vdfxdydbggeoflagznuq.supabase.co";
        const supabaseKey = "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz";
        window.db = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargar() {
            const listaDiv = document.getElementById('lista');
            
            // Hacemos la consulta
            const { data, error } = await window.db.from('estudiantes').select('*');
            
            // Esto es para que tú veas qué pasa en la consola (F12)
            console.log("Datos recibidos:", data);
            console.log("Error recibido:", error);

            if (error) {
                listaDiv.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            } else if (!data || data.length === 0) {
                listaDiv.innerHTML = `<p class="text-gray-500">La tabla está vacía. Ve a Supabase e inserta un registro.</p>`;
            } else {
                listaDiv.innerHTML = data.map(e => `
                    <div class="bg-white p-4 shadow rounded border">
                        <h3 class="font-bold">${e.nombre_completo || 'Sin nombre'}</h3>
                    </div>
                `).join('');
            }
        }
        cargar();
    </script>
</body>
</html>
