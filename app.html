<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Montessori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-800 p-4 text-white flex gap-4">
        <button onclick="mostrar('estudiantes')">Estudiantes</button>
        <button onclick="mostrar('docentes')">Docentes</button>
        <button onclick="mostrar('manual')">Registro Manual</button>
    </nav>

    <div id="contenido" class="p-6"></div>

    <script>
        const db = supabase.createClient("URL", "KEY");

        function mostrar(seccion) {
            const div = document.getElementById('contenido');
            if(seccion === 'manual') {
                div.innerHTML = `
                    <div class="bg-white p-6 rounded shadow">
                        <input id="nombre" placeholder="Nombre" class="border p-2 w-full mb-2">
                        <button onclick="guardar()" class="bg-green-600 text-white p-2">Guardar Estudiante</button>
                    </div>`;
            } else {
                div.innerHTML = `Cargando ${seccion}...`;
                // Aquí iría tu lógica de db.from(seccion).select('*')
            }
        }

        async function guardar() {
            const nombre = document.getElementById('nombre').value;
            await db.from('estudiantes').insert([{ nombre_completo: nombre }]);
            alert("Guardado con éxito");
        }
    </script>
</body>
</html>
