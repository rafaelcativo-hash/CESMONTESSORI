<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo CES Montessori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-900 p-4 text-white shadow-lg">
        <div class="max-w-6xl mx-auto flex gap-6">
            <button onclick="render('estudiantes')" class="hover:text-blue-200 font-bold">Gestión Estudiantes</button>
            <button onclick="render('matricula')" class="hover:text-blue-200 font-bold">Matrícula</button>
            <button onclick="render('notas')" class="hover:text-blue-200 font-bold">Evaluaciones</button>
        </div>
    </nav>

    <main id="app" class="max-w-6xl mx-auto p-6">
        <h1 class="text-2xl font-bold">Bienvenido al Panel de Control</h1>
    </main>

    <script>
        const db = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");

        // Motor de navegación simple
        function render(vista) {
            const app = document.getElementById('app');
            if (vista === 'estudiantes') {
                app.innerHTML = `
                    <h2 class="text-xl font-bold mb-4">Registro de Estudiantes</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input id="nombre" placeholder="Nombre Completo" class="border p-2 rounded">
                        <select id="ciclo" class="border p-2 rounded">
                            <option value="1">Primer Ciclo (1°-3°)</option>
                            <option value="2">Segundo Ciclo (4°-6°)</option>
                        </select>
                        <button onclick="guardarEstudiante()" class="bg-blue-600 text-white p-2 rounded col-span-2">Registrar Estudiante</button>
                    </div>`;
            } else if (vista === 'matricula') {
                app.innerHTML = `
                    <h2 class="text-xl font-bold mb-4">Matrícula de Materias</h2>
                    <p class="mb-4">Seleccione materias: 1 Obligatoria + Opcionales (Pago)</p>
                    <div id="lista-materias" class="space-y-2">
                        </div>`;
            }
        }

        async function guardarEstudiante() {
            const nombre = document.getElementById('nombre').value;
            const ciclo = document.getElementById('ciclo').value;
            const { error } = await db.from('estudiantes').insert([{ 
                nombre_completo: nombre, 
                ciclo: ciclo 
            }]);
            if(error) alert(error.message);
            else alert("Estudiante registrado");
        }
    </script>
</body>
</html>
