<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema CES Montessori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-5">
    <div id="app" class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Carga Docente</h1>
        <div id="contenido">Cargando...</div>
    </div>

    <script>
        // Conexión única
        const supabase = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");

        async function iniciar() {
            const contenido = document.getElementById('contenido');
            // Intentar obtener usuario
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                contenido.innerHTML = `<p>Por favor inicia sesión primero.</p>`;
                return;
            }

            // Consultar datos
            const { data, error } = await supabase.from('docentes_niveles').select('*').eq('perfil_id', user.id);
            
            if (error) {
                contenido.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            } else {
                contenido.innerHTML = data.length > 0 ? 
                    data.map(d => `<div class="p-4 border-b">${d.materia_especifica} - ${d.nivel_asignado}</div>`).join('') :
                    "<p>No tienes materias asignadas.</p>";
            }
        }
        iniciar();
    </script>
</body>
</html>
