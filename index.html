<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CES Montessori - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h2>
        <input type="email" id="email" class="w-full border p-3 mb-4 rounded" placeholder="Correo electrónico">
        <input type="password" id="password" class="w-full border p-3 mb-6 rounded" placeholder="Contraseña">
        <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Entrar</button>
    </div>

    <script>
        // Inicialización segura
        const supabaseUrl = "https://vdfxdydbggeoflagznuq.supabase.co";
        const supabaseKey = "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz";
        window.db = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                alert("Completa todos los campos");
                return;
            }

            const { error } = await window.db.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Error: " + error.message);
            } else {
                window.location.href = "app.html";
            }
        });
    </script>
</body>
</html>
