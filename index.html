<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-xl font-bold mb-6 text-center">Ingreso al Sistema</h2>
        <input type="email" id="email" class="w-full border p-2 mb-4 rounded" placeholder="Correo electrónico">
        <input type="password" id="pass" class="w-full border p-2 mb-6 rounded" placeholder="Contraseña">
        <button onclick="iniciarSesion()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Entrar</button>
    </div>

    <script>
        const supabase = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");
        async function iniciarSesion() {
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) alert("Error: " + error.message);
            else window.location.href = "calificaciones.html";
        }
    </script>
</body>
</html>
