<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CES Montessori - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            /* 'cover' asegura que la imagen se estire para cubrir todo */
            background-image: url('Logo CES.png');
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
            /* Fija el fondo para que no se mueva al hacer scroll */
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
        }
        
        .glass-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="glass-container p-8 rounded-lg shadow-2xl w-96 border border-white/50">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Acceso Institucional</h2>
        <input type="email" id="email" class="w-full border p-3 mb-4 rounded" placeholder="Correo electrónico">
        <input type="password" id="password" class="w-full border p-3 mb-6 rounded" placeholder="Contraseña">
        <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700 transition">Entrar</button>
    </div>

    <script>
        const supabaseUrl = "https://vdfxdydbggeoflagznuq.supabase.co";
        const supabaseKey = "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz";
        window.db = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const { error } = await window.db.auth.signInWithPassword({ email, password });
            if (error) alert("Error: " + error.message);
            else window.location.href = "app.html";
        });
    </script>
</body>
</html>
