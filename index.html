<script>
    console.log("El script ha cargado correctamente.");

    // Inicialización
    window.db = window.db || supabase.createClient(
        "https://vdfxdydbggeoflagznuq.supabase.co", 
        "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz"
    );

    document.getElementById('loginBtn').addEventListener('click', () => {
        console.log("¡El botón fue presionado!");
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
            alert("Campos vacíos");
            return;
        }

        window.db.auth.signInWithPassword({
            email: email,
            password: password
        }).then(({ data, error }) => {
            if (error) {
                console.error("Error en el login:", error.message);
                alert("Error: " + error.message);
            } else {
                console.log("Login exitoso, redirigiendo...");
                window.location.href = "app.html";
            }
        });
    });
</script>
