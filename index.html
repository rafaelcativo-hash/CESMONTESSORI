<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - CES Montessori</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl w-96">
        <h2 class="text-xl font-bold mb-6 text-center">Acceso CES Montessori</h2>
        <input type="email" id="email" class="w-full border p-2 mb-4 rounded" placeholder="Correo">
        <input type="password" id="pass" class="w-full border p-2 mb-6 rounded" placeholder="Contraseña">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Ingresar</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient("https://vdfxdydbggeoflagznuq.supabase.co", "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz");
        async function login() {
            const { error } = await supabase.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('pass').value 
            });
            if(error) alert(error.message); else window.location.href = "calificaciones.html";
        }
    </script>
</body>
</html>
