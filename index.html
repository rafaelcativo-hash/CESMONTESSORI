<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CES Montessori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Ingreso al Sistema</h2>
        <input type="email" id="email" class="w-full border p-2 mb-4 rounded" placeholder="Correo electrónico">
        <input type="password" id="pass" class="w-full border p-2 mb-6 rounded" placeholder="Contraseña">
        <button id="btnEntrar" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Entrar</button>
    </div>

    <script>
        // Declaramos la conexión UNA SOLA VEZ
        const supabase = supabase.createClient(
            "https://vdfxdydbggeoflagznuq.supabase.co", 
            "sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz"
        );

        // Usamos un listener para evitar el error de "login not defined"
        document.getElementById('btnEntrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            try {
                const { error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: pass
                });

                if (error) {
                    alert("Error al entrar: " + error.message);
                } else {
                    window.location.href = "calificaciones.html";
                }
            } catch (err) {
                alert("Error crítico: " + err.message);
            }
        });
    </script>
</body>
</html>
