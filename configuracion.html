<!DOCTYPE html>
<html lang="es">
<head>

    <title>Configuración General - CES Montessori</title>

    <style>
        body { background-color: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { border: none; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-header { font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h2 class="text-dark font-weight-bold mb-0">📍 Panel de Control Absoluto</h2>
                <p class="text-muted mb-0">Centro Educativo Shkénuk Montessori — Ciclo 2026</p>
            </div>
            <span class="badge badge-secondary p-2">Módulo Administrativo</span>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">📅 Curso Lectivo y Vacaciones</div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-3">
                        <label class="font-weight-bold">Inicio de Curso:</label>
                        <input type="date" id="calInicioCurso" class="form-control">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="font-weight-bold">Finalización de Curso:</label>
                        <input type="date" id="calFinCurso" class="form-control">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="font-weight-bold">Inicio de Vacaciones:</label>
                        <input type="date" id="calInicioVacaciones" class="form-control">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="font-weight-bold">Fin de Vacaciones:</label>
                        <input type="date" id="calFinVacaciones" class="form-control">
                    </div>
                </div>
                <div class="text-right">
                    <button class="btn btn-primary px-4" id="btnGuardarCalendario">Establecer Fechas del Curso</button>
                </div>
            </div>
        </div>

            <div class="card-header bg-success text-white">👥 Registro y Gestión de Docentes</div>
