<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista - CES MONTESSORI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Listado de Estudiantes</h1>
        <table class="w-full border-collapse border">
            <thead class="bg-gray-800 text-white">
                <tr><th class="border p-2">Nombre</th><th class="border p-2">Cédula</th><th class="border p-2">Nivel</th></tr>
            </thead>
            <tbody id="tabla" class="text-center"></tbody>
        </table>
    </div>
    <script>
        const supabase = supabase.createClient('https://vdfxdydbggeoflagznuq.supabase.co', 'sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz');
        async function cargar() {
            const { data, error } = await supabase.from('estudiantes').select('*');
            if (error) { alert("Error: " + error.message); return; }
            document.getElementById('tabla').innerHTML = data.map(e => `
                <tr class="border-b">
                    <td class="p-2">${e.nombre_completo}</td>
                    <td class="p-2">${e.cedula}</td>
                    <td class="p-2">${e.nivel_numero}</td>
                </tr>`).join('');
        }
        cargar();
    </script>
</body>
</html>
