<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista CES MONTESSORI</title>
    <!-- Tailwind para diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Listado de Estudiantes</h1>
        
        <table class="w-full border-collapse border border-gray-300">
            <thead>
                <tr class="bg-gray-800 text-white">
                    <th class="p-3 border">Nombre</th>
                    <th class="p-3 border">Cédula</th>
                    <th class="p-3 border">Nivel</th>
                </tr>
            </thead>
            <tbody id="tabla" class="text-center">
                <!-- Los datos se insertarán aquí automáticamente -->
            </tbody>
        </table>
    </div>

    <script>
        // Configuración de conexión (No cambies esto)
        const supabase = supabase.createClient(
            'https://vdfxdydbggeoflagznuq.supabase.co', 
            'sb_publishable_1PItL4GwJ_y_8gfSqWFVXw_Tt0GoLsz'
        );

        async function cargar() {
            const tabla = document.getElementById('tabla');
            
            // Intentamos traer los datos
            const { data, error } = await supabase.from('estudiantes').select('*');
            
            if (error) {
                console.error("Error crítico:", error);
                tabla.innerHTML = `<tr><td colspan="3" class="p-4 text-red-600">Error: ${error.message}</td></tr>`;
                return;
            }

            // Si no hay datos, avisamos al usuario
            if (!data || data.length === 0) {
                tabla.innerHTML = `<tr><td colspan="3" class="p-4">No hay estudiantes registrados.</td></tr>`;
                return;
            }

            // Renderizamos los datos de forma segura
            tabla.innerHTML = data.map(e => `
                <tr class="hover:bg-gray-50 border-b">
                    <td class="p-3 border">${e.nombre_completo || 'N/A'}</td>
                    <td class="p-3 border">${e.cedula || 'N/A'}</td>
                    <td class="p-3 border">${e.nivel_numero || 'N/A'}</td>
                </tr>
            `).join('');
        }

        // Ejecutar al cargar la página
        cargar();
    </script>
</body>
</html>
