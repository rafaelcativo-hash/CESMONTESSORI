<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-10">
    <table class="w-full border" id="tabla"></table>
    <script>
        const supabase = supabase.createClient('TU_URL', 'TU_KEY');
        async function cargar() {
            const { data } = await supabase.from('estudiantes').select('*');
            document.getElementById('tabla').innerHTML = data.map(e => 
                `<tr><td class="border p-2">${e.nombre_completo}</td></tr>`).join('');
        }
        cargar();
    </script>
</body>
</html>
