<table class="w-full border mt-4">
    <thead class="bg-gray-200">
        <tr><th>Nombre</th><th>Ciclo</th><th>Nivel</th><th>Ubicación</th></tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>
<script>
    // ... conexión supabase ...
    async function cargar() {
        const { data } = await supabase.from('estudiantes').select('*');
        document.getElementById('tabla').innerHTML = data.map(e => 
            `<tr>
                <td class="border p-2">${e.nombre_completo}</td>
                <td class="border p-2">${e.ciclo_escolar}</td>
                <td class="border p-2">${e.nivel_numero}</td>
                <td class="border p-2">${e.provincia}, ${e.canton}</td>
            </tr>`).join('');
    }
    cargar();
</script>
