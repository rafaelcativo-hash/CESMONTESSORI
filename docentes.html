<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. REEMPLAZA ESTOS DATOS CON TUS CREDENCIALES REALES
        const SUPABASE_URL = "TU_SUPABASE_URL_AQUÍ";
        const SUPABASE_KEY = "TU_SUPABASE_KEY_AQUÍ";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Al cargar la página, traer la lista de docentes reales
        document.addEventListener('DOMContentLoaded', obtenerDocentesReal);

        // FUNCIÓN REAL: Guardar el docente en la base de datos de Supabase
        async function registrarDocenteReal() {
            const uid = document.getElementById('docenteUid').value.trim();
            const nivel = document.getElementById('docenteNivel').value;
            const materia = document.getElementById('docenteMateria').value;

            if(!uid) {
                alert("Por favor ingrese el código UID del perfil del docente.");
                return;
            }

            try {
                // Insertar los datos en la tabla que creamos en Supabase
                const { data, error } = await supabase
                    .from('docentes_niveles')
                    .insert([
                        { 
                            perfil_id: uid, 
                            nivel_assigned: nivel, // Si en tu SQL pusiste nivel_asignado, cámbialo aquí a nivel_asignado
                            materia_especifica: materia 
                        }
                    ]);

                if (error) throw error;

                alert("¡Docente registrado con éxito en la base de datos!");
                document.getElementById('form-docente').reset();
                
                // Recargar la tabla para ver el nuevo registro en tiempo real
                obtenerDocentesReal();

            } catch (error) {
                console.error("Error al registrar:", error);
                alert("Hubo un error al guardar: " + error.message);
            }
        }

        // FUNCIÓN REAL: Leer los docentes que ya están guardados en Supabase
        async function obtenerDocentesReal() {
            const tbody = document.getElementById('tabla-docentes-cuerpo');
            tbody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-400">Cargando docentes...</td></tr>`;

            try {
                const { data: docentes, error } = await supabase
                    .from('docentes_niveles')
                    .select('*');

                if (error) throw error;

                tbody.innerHTML = ''; // Limpiar mensaje de carga

                if(docentes.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-400">No hay docentes registrados aún.</td></tr>`;
                    return;
                }

                // Dibujar cada fila con los datos reales que vienen de Supabase
                docentes.forEach(docente => {
                    const nuevaFila = document.createElement('tr');
                    nuevaFila.innerHTML = `
                        <td class="py-3 font-mono text-xs text-slate-500">${docente.perfil_id}</td>
                        <td class="py-3 font-medium">${docente.nivel_assigned || docente.nivel_asignado}</td>
                        <td class="py-3"><span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-xs font-semibold">${docente.materia_especifica}</span></td>
                        <td class="py-3 text-right">
                            <button class="text-red-500 hover:text-red-700 text-xs font-bold" onclick="eliminarDocenteReal(${docente.id})">Remover</button>
                        </td>
                    `;
                    tbody.appendChild(nuevaFila);
                });

            } catch (error) {
                console.error("Error al obtener datos:", error);
                tbody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-red-500">Error al cargar datos.</td></tr>`;
            }
        }

        // FUNCIÓN REAL: Eliminar un docente de la base de datos
        async function eliminarDocenteReal(id) {
            if(!confirm("¿Está seguro de que desea remover esta asignación docente?")) return;

            try {
                const { error } = await supabase
                    .from('docentes_niveles')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                alert("Asignación removida correctamente.");
                obtenerDocentesReal();
            } catch (error) {
                alert("Error al eliminar: " + error.message);
            }
        }
    </script>
